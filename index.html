<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Breeze Login Token Saver</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-labelledby="page-title">
        <p class="eyebrow">Breeze API</p>
        <h1 id="page-title">Save access code</h1>
        <p class="intro">
          Login, paste API_Session, save.
        </p>

        <div class="status" id="config-status" role="status"></div>

        <label class="pin-label" for="admin-pin">Admin PIN</label>
        <input
          id="admin-pin"
          name="admin-pin"
          type="password"
          autocomplete="current-password"
          placeholder="Private PIN"
        >

        <div class="actions">
          <button class="primary" id="open-login" type="button">Open Breeze login</button>
          <button class="secondary" id="copy-login" type="button">Copy login link</button>
        </div>

        <form id="token-form" class="form">
          <label for="access-code">Access code / API_Session</label>
          <textarea
            id="access-code"
            name="access-code"
            rows="4"
            autocomplete="off"
            placeholder="Paste API_Session or redirected URL"
            required
          ></textarea>

          <label for="note">Note</label>
          <input id="note" name="note" type="text" placeholder="Optional">

          <button class="primary full" type="submit">Save to Supabase</button>
        </form>

        <div class="result" id="result" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
